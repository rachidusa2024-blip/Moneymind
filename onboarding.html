<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Vera — Sum Goals</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#080E1A;
  --surface:#0F1829;
  --gold:#C9A84C;
  --gold-dim:rgba(201,168,76,0.1);
  --gold-border:rgba(201,168,76,0.25);
  --teal:#00C9A7;
  --white:#F0F4FF;
  --muted:#8B9CB6;
  --dim:#3D5073;
  --border:rgba(255,255,255,0.07);
  --red:#EF4444;
  --green:#10B981;
  --font-head:'Playfair Display',serif;
  --font-body:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font-body);color:var(--white)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInRight{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-60px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes goldGlow{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 30px 8px rgba(201,168,76,0.15)}}

/* INTRO SCREEN */
#introScreen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--bg);z-index:100;
  transition:opacity 1s ease;
}
#introScreen.hidden{opacity:0;pointer-events:none}
.intro-tagline{
  font-size:10px;letter-spacing:.35em;text-transform:uppercase;
  color:var(--gold);opacity:0;
  animation:fadeIn 1s ease 0.5s forwards;
  margin-bottom:40px;
}
.intro-vera{
  font-family:var(--font-head);
  font-size:clamp(72px,12vw,120px);
  font-style:italic;color:var(--white);
  letter-spacing:-3px;line-height:1;
  opacity:0;animation:scaleIn 1.2s ease 1s forwards;
}
.intro-vera span{color:var(--gold)}
.intro-line{
  width:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:28px 0;
  animation:none;
  transition:width 1s ease 1.8s;
}
.intro-sub{
  font-size:12px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);opacity:0;
  animation:fadeIn 1s ease 2.4s forwards;
}

/* MAIN WRAPPER */
#mainWrapper{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  opacity:0;transition:opacity 0.8s ease;
}
#mainWrapper.visible{opacity:1}

/* TOP BAR */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 32px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tb-brand{
  font-family:var(--font-head);
  font-size:16px;font-style:italic;color:var(--white);
}
.tb-brand span{color:var(--gold)}
.tb-step{font-size:12px;color:var(--dim);letter-spacing:.06em}

/* PROGRESS DOTS */
.progress-dots{
  display:flex;gap:6px;align-items:center;
  padding:16px 32px;flex-shrink:0;
}
.pdot{
  height:3px;border-radius:2px;
  background:var(--border);
  transition:all 0.4s ease;flex:1;
}
.pdot.active{background:var(--gold)}
.pdot.done{background:rgba(201,168,76,0.4)}

/* SLIDE CONTAINER */
.slide-container{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:20px 32px;overflow:hidden;position:relative;
}

/* SLIDE */
.slide{
  width:100%;max-width:520px;
  position:absolute;
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
}
.slide.entering{animation:slideInRight 0.4s cubic-bezier(0.4,0,0.2,1) forwards}
.slide.exiting{animation:slideOut 0.4s cubic-bezier(0.4,0,0.2,1) forwards}
.slide.entering-back{animation:slideInLeft 0.4s cubic-bezier(0.4,0,0.2,1) forwards}

/* VERA LABEL */
.vera-label{
  display:flex;align-items:center;gap:10px;
  margin-bottom:20px;
}
.vera-av{
  width:32px;height:32px;border-radius:50%;
  background:var(--gold-dim);border:1.5px solid var(--gold-border);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-head);font-size:13px;font-style:italic;
  color:var(--gold);flex-shrink:0;
  animation:goldGlow 3s ease infinite;
}
.vera-name-lbl{
  font-size:11px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--gold);
}

/* QUESTION */
.question{
  font-family:var(--font-head);
  font-size:clamp(22px,4vw,34px);
  font-style:italic;color:var(--white);
  line-height:1.2;letter-spacing:-0.5px;
  margin-bottom:10px;
}
.question-sub{
  font-size:13px;color:var(--muted);
  margin-bottom:28px;line-height:1.55;
}

/* TEXT INPUT SLIDE */
.slide-input{
  width:100%;background:transparent;
  border:none;border-bottom:2px solid var(--gold-border);
  padding:14px 0;
  color:var(--white);font-size:clamp(22px,4vw,32px);
  font-family:var(--font-head);font-style:italic;
  outline:none;transition:border-color 0.3s;
  letter-spacing:-0.5px;
}
.slide-input:focus{border-color:var(--gold)}
.slide-input::placeholder{color:var(--dim)}

/* NUMBER INPUT */
.number-row{display:flex;align-items:baseline;gap:12px}
.currency-lbl{
  font-family:var(--font-head);font-size:28px;font-style:italic;
  color:var(--gold);flex-shrink:0;
}
.slide-number{
  flex:1;background:transparent;border:none;
  border-bottom:2px solid var(--gold-border);
  padding:14px 0;color:var(--white);
  font-size:clamp(28px,5vw,42px);
  font-family:var(--font-head);font-style:italic;
  outline:none;transition:border-color 0.3s;
  letter-spacing:-1px;
}
.slide-number:focus{border-color:var(--gold)}
.slide-number::placeholder{color:var(--dim)}

/* SELECT */
.slide-select{
  width:100%;background:var(--surface);
  border:1px solid var(--gold-border);
  border-radius:12px;padding:14px 16px;
  color:var(--white);font-size:16px;
  font-family:var(--font-body);outline:none;
  cursor:pointer;margin-bottom:8px;
  transition:border-color 0.2s;
}
.slide-select:focus{border-color:var(--gold)}
.slide-select option{background:var(--surface);color:var(--white)}

/* CHOICE CARDS */
.choice-grid{display:flex;flex-direction:column;gap:8px}
.choice-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;gap:12px;
  text-align:left;
}
.choice-card:hover{border-color:var(--gold-border);background:var(--gold-dim)}
.choice-card.selected{border-color:var(--gold);background:var(--gold-dim)}
.choice-radio{
  width:18px;height:18px;border-radius:50%;
  border:1.5px solid var(--dim);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.choice-card.selected .choice-radio{border-color:var(--gold)}
.choice-card.selected .choice-radio::after{
  content:'';width:8px;height:8px;
  background:var(--gold);border-radius:50%;display:block;
}
.choice-text{font-size:14px;color:var(--muted);transition:color 0.2s}
.choice-card.selected .choice-text{color:var(--white)}

/* BOTTOM BAR */
.bottom-bar{
  padding:20px 32px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.btn-back-slide{
  background:transparent;color:var(--dim);
  border:1px solid var(--border);border-radius:8px;
  padding:10px 20px;font-size:13px;font-weight:500;
  cursor:pointer;font-family:var(--font-body);
  transition:all 0.2s;
}
.btn-back-slide:hover{color:var(--muted);border-color:var(--dim)}
.btn-back-slide:disabled{opacity:0.3;cursor:not-allowed}
.btn-next-slide{
  background:var(--gold);color:#080E1A;
  border:none;border-radius:8px;
  padding:12px 28px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:var(--font-body);
  transition:all 0.2s;letter-spacing:.02em;
  display:flex;align-items:center;gap:8px;
}
.btn-next-slide:hover{background:#D4B05A;transform:translateY(-1px)}
.btn-next-slide:disabled{background:var(--dim);cursor:not-allowed;transform:none}
.btn-next-slide svg{width:16px;height:16px;fill:#080E1A}
.skip-btn{
  font-size:12px;color:var(--dim);
  background:none;border:none;cursor:pointer;
  font-family:var(--font-body);transition:color 0.2s;
}
.skip-btn:hover{color:var(--muted)}

/* ANALYSIS */
#analysisScreen{
  position:fixed;inset:0;background:var(--bg);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
  z-index:200;
}
.analysis-ring{
  width:64px;height:64px;
  border:3px solid var(--gold-dim);
  border-top-color:var(--gold);
  border-radius:50%;animation:spin 1s linear infinite;
}
.analysis-title{
  font-family:var(--font-head);font-size:24px;font-style:italic;color:var(--white);
}
.analysis-steps{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.astep{font-size:12px;color:var(--dim);letter-spacing:.06em;text-align:center;transition:color 0.5s}
.astep.active{color:var(--gold)}

/* RESULT */
#resultScreen{
  position:fixed;inset:0;background:var(--bg);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;z-index:200;overflow-y:auto;
}
.result-card{
  width:100%;max-width:500px;
  background:var(--surface);
  border:1px solid var(--gold-border);
  border-radius:24px;overflow:hidden;
  animation:scaleIn 0.5s ease forwards;
}
.result-header{
  background:linear-gradient(135deg,#0A1020,#0F1829);
  padding:28px;text-align:center;
  border-bottom:1px solid var(--gold-border);
  position:relative;overflow:hidden;
}
.result-header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 100%,rgba(201,168,76,0.12),transparent 60%);
}
.result-vera-lbl{
  font-size:10px;letter-spacing:.15em;text-transform:uppercase;
  color:var(--gold);margin-bottom:12px;position:relative;
}
.result-score-num{
  font-family:var(--font-head);
  font-size:80px;font-style:italic;color:var(--gold);
  line-height:1;letter-spacing:-3px;position:relative;
}
.result-score-max{font-size:20px;color:var(--muted)}
.result-grade{font-size:14px;color:var(--white);font-weight:500;margin-top:8px;position:relative}
.result-body{padding:24px}
.result-stat-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;
}
.rstat{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);border-radius:10px;padding:12px;
}
.rstat-lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.rstat-val{font-family:var(--font-head);font-size:20px;font-style:italic}
.rstat-val.gold{color:var(--gold)}.rstat-val.teal{color:var(--teal)}.rstat-val.red{color:var(--red)}
.result-actions-title{
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--teal);font-weight:600;margin-bottom:10px;
}
.result-action{
  display:flex;gap:10px;font-size:13px;color:var(--muted);
  margin-bottom:8px;line-height:1.5;align-items:flex-start;
}
.result-action::before{content:'→';color:var(--gold);flex-shrink:0;font-weight:700}
.btn-enter-dashboard{
  width:100%;padding:14px;margin-top:16px;
  background:linear-gradient(135deg,var(--gold),#B8923C);
  color:#080E1A;border:none;border-radius:10px;
  font-weight:700;font-size:15px;
  cursor:pointer;font-family:var(--font-body);
  transition:all 0.2s;letter-spacing:.02em;
}
.btn-enter-dashboard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,0.3)}

@media(max-width:600px){
  .top-bar,.bottom-bar,.progress-dots,.slide-container{padding-left:20px;padding-right:20px}
  .question{font-size:24px}
  .slide-number{font-size:32px}
}
</style>
</head>
<body>

<!-- INTRO -->
<div id="introScreen">
  <div class="intro-tagline">Sum Goals — Private Financial Coaching</div>
  <div class="intro-vera">Ve<span>ra</span></div>
  <div class="intro-line" id="introLine"></div>
  <div class="intro-sub">The truth about your money. Finally.</div>
</div>

<!-- MAIN -->
<div id="mainWrapper">
  <div class="top-bar">
    <div class="tb-brand"><i>Sum</i> <span>Goals</span></div>
    <div class="tb-step" id="stepLabel">Session 1 of 1</div>
  </div>
  <div class="progress-dots" id="progressDots"></div>
  <div class="slide-container" id="slideContainer"></div>
  <div class="bottom-bar">
    <button class="btn-back-slide" id="backBtn" onclick="goBack()" disabled>← Back</button>
    <button class="skip-btn" onclick="skipOnboarding()">Skip for now</button>
    <button class="btn-next-slide" id="nextBtn" onclick="goNext()">
      Continue
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
</div>

<!-- ANALYSIS -->
<div id="analysisScreen">
  <div class="analysis-ring"></div>
  <div class="analysis-title">Vera is analyzing your situation</div>
  <div class="analysis-steps">
    <div class="astep active" id="as1">Reviewing your income and expenses...</div>
    <div class="astep" id="as2">Calculating your financial health score...</div>
    <div class="astep" id="as3">Building your personalized plan...</div>
    <div class="astep" id="as4">Preparing your first recommendations...</div>
  </div>
</div>

<!-- RESULT -->
<div id="resultScreen">
  <div class="result-card" id="resultCard"></div>
</div>

<script>
const SURL = 'https://dmdvoygnzbosjbwsriea.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtZHZveWduemJvc2pid3NyaWVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NjAzNDksImV4cCI6MjA5MjAzNjM0OX0.o8m8etdU1Znupr4bkklUcXyehYIOiCU3HZxgmbzCO18';
const { createClient } = supabase;
const sb = createClient(SURL, SKEY);

var user = null;
var currentSlide = 0;
var goingBack = false;
var answers = { language:'en', currency:'USD', income:0, rent:0, otherExpenses:0, debt:0, savings:0, dependents:0, fear:'', goal:'' };

var slides = [
  {
    id: 'language',
    question: 'What language do you prefer?',
    sub: 'Vera speaks your language — choose the one you are most comfortable with.',
    type: 'select',
    options: [
      { value:'en', label:'English' },
      { value:'es', label:'Español (Spanish)' },
      { value:'fr', label:'Français (French)' },
      { value:'ar', label:'العربية (Arabic)' },
      { value:'pt', label:'Português (Portuguese)' },
      { value:'zh', label:'中文 (Chinese)' },
      { value:'hi', label:'हिन्दी (Hindi)' },
      { value:'other', label:'Other language' }
    ],
    key: 'language'
  },
  {
    id: 'currency',
    question: 'What currency do you use?',
    sub: 'Every number Vera gives you will be in your currency.',
    type: 'select',
    options: [
      { value:'USD', label:'USD — US Dollar' },
      { value:'CAD', label:'CAD — Canadian Dollar' },
      { value:'EUR', label:'EUR — Euro' },
      { value:'GBP', label:'GBP — British Pound' },
      { value:'MXN', label:'MXN — Mexican Peso' },
      { value:'BRL', label:'BRL — Brazilian Real' },
      { value:'ARS', label:'ARS — Argentine Peso' },
      { value:'MAD', label:'MAD — Moroccan Dirham' },
      { value:'DZD', label:'DZD — Algerian Dinar' },
      { value:'INR', label:'INR — Indian Rupee' },
      { value:'PKR', label:'PKR — Pakistani Rupee' },
      { value:'AED', label:'AED — UAE Dirham' },
      { value:'TRY', label:'TRY — Turkish Lira' },
      { value:'other', label:'Other currency' }
    ],
    key: 'currency'
  },
  {
    id: 'income',
    question: 'What is your monthly income after taxes?',
    sub: 'Include your salary and any regular side income. Be as accurate as possible.',
    type: 'number',
    placeholder: '0',
    key: 'income'
  },
  {
    id: 'rent',
    question: 'How much do you pay for rent or mortgage?',
    sub: 'Your largest fixed monthly expense. Enter 0 if you live rent-free.',
    type: 'number',
    placeholder: '0',
    key: 'rent'
  },
  {
    id: 'otherExpenses',
    question: 'What are your other monthly expenses?',
    sub: 'Food, transport, utilities, phone, subscriptions, entertainment — everything else combined.',
    type: 'number',
    placeholder: '0',
    key: 'otherExpenses'
  },
  {
    id: 'debt',
    question: 'What is your total debt?',
    sub: 'Credit cards, loans, car payments, student debt — all combined. Enter 0 if you have none.',
    type: 'number',
    placeholder: '0',
    key: 'debt'
  },
  {
    id: 'savings',
    question: 'How much do you have in savings right now?',
    sub: 'Total across all accounts. Enter 0 if you have none. No judgment — this is your starting point.',
    type: 'number',
    placeholder: '0',
    key: 'savings'
  },
  {
    id: 'dependents',
    question: 'How many people depend on you financially?',
    sub: 'Children, a partner who does not work, or family members you support.',
    type: 'choice',
    choices: [
      { value:0, label:'Only myself' },
      { value:1, label:'1 person depends on me' },
      { value:2, label:'2 people depend on me' },
      { value:3, label:'3 or more people depend on me' }
    ],
    key: 'dependents'
  },
  {
    id: 'fear',
    question: 'What is your biggest financial fear?',
    sub: 'Be honest. Vera has heard it all and will not judge you.',
    type: 'choice',
    choices: [
      { value:'debt', label:'Never getting out of debt' },
      { value:'paycheck', label:'Living paycheck to paycheck forever' },
      { value:'emergency', label:'A financial emergency I cannot handle' },
      { value:'family', label:'Not being able to provide for my family' },
      { value:'future', label:'Not having enough for the future' }
    ],
    key: 'fear'
  },
  {
    id: 'goal',
    question: 'What is your most important financial goal this year?',
    sub: 'This becomes the north star of your transformation with Vera.',
    type: 'choice',
    choices: [
      { value:'debt', label:'Eliminate or significantly reduce my debt' },
      { value:'save', label:'Build real savings for the first time' },
      { value:'house', label:'Save for a home down payment' },
      { value:'emergency', label:'Build a solid emergency fund' },
      { value:'freedom', label:'Stop worrying about money every month' }
    ],
    key: 'goal'
  }
];

async function init() {
  var res = await sb.auth.getSession();
  if (!res.data.session) { window.location.href = '/index.html'; return; }
  user = res.data.session.user;
  buildProgressDots();
  setTimeout(function() {
    document.getElementById('introLine').style.width = '200px';
  }, 100);
  setTimeout(startSession, 3200);
}

function buildProgressDots() {
  var dots = document.getElementById('progressDots');
  dots.innerHTML = slides.map(function(s, i) {
    return '<div class="pdot" id="pdot' + i + '"></div>';
  }).join('');
}

function updateDots() {
  slides.forEach(function(s, i) {
    var dot = document.getElementById('pdot' + i);
    if (!dot) return;
    dot.className = 'pdot' + (i === currentSlide ? ' active' : i < currentSlide ? ' done' : '');
  });
  document.getElementById('stepLabel').textContent = (currentSlide + 1) + ' of ' + slides.length;
  document.getElementById('backBtn').disabled = currentSlide === 0;
}

function startSession() {
  document.getElementById('introScreen').classList.add('hidden');
  setTimeout(function() {
    document.getElementById('introScreen').style.display = 'none';
    document.getElementById('mainWrapper').classList.add('visible');
    renderSlide(0, false);
  }, 1000);
}

function renderSlide(index, back) {
  var container = document.getElementById('slideContainer');
  var slide = slides[index];
  var cur = answers.currency || 'USD';

  var existing = container.querySelector('.slide');
  if (existing) {
    existing.classList.add(back ? 'exiting' : 'exiting');
    existing.style.animation = 'slideOut 0.3s ease forwards';
    setTimeout(function() { if (existing.parentNode) existing.parentNode.removeChild(existing); }, 300);
  }

  setTimeout(function() {
    var div = document.createElement('div');
    div.className = 'slide';

    var html = '<div class="vera-label"><div class="vera-av">V</div><div class="vera-name-lbl">Vera</div></div>';
    html += '<div class="question">' + slide.question + '</div>';
    html += '<div class="question-sub">' + slide.sub + '</div>';

    if (slide.type === 'number') {
      var val = answers[slide.key] || '';
      html += '<div class="number-row"><div class="currency-lbl">' + cur + '</div><input class="slide-number" id="slideInput" type="number" min="0" placeholder="' + slide.placeholder + '" value="' + (val || '') + '"></div>';
    } else if (slide.type === 'select') {
      html += '<select class="slide-select" id="slideInput">';
      slide.options.forEach(function(o) {
        html += '<option value="' + o.value + '"' + (answers[slide.key] === o.value ? ' selected' : '') + '>' + o.label + '</option>';
      });
      html += '</select>';
    } else if (slide.type === 'choice') {
      html += '<div class="choice-grid">';
      slide.choices.forEach(function(c, i) {
        var sel = answers[slide.key] === c.value ? ' selected' : '';
        html += '<div class="choice-card' + sel + '" onclick="selectChoice(' + i + ')" id="choice' + i + '"><div class="choice-radio"></div><div class="choice-text">' + c.label + '</div></div>';
      });
      html += '</div>';
    }

    div.innerHTML = html;
    div.style.animation = (back ? 'slideInLeft' : 'slideInRight') + ' 0.4s cubic-bezier(0.4,0,0.2,1) forwards';
    container.appendChild(div);

    if (slide.type === 'number') {
      var inp = document.getElementById('slideInput');
      inp.focus();
      inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') goNext(); });
    }

    updateDots();
  }, existing ? 280 : 0);
}

function selectChoice(i) {
  var slide = slides[currentSlide];
  document.querySelectorAll('.choice-card').forEach(function(c) { c.classList.remove('selected'); });
  document.getElementById('choice' + i).classList.add('selected');
  answers[slide.key] = slide.choices[i].value;
  setTimeout(function() { goNext(); }, 350);
}

function getCurrentValue() {
  var slide = slides[currentSlide];
  if (slide.type === 'number') {
    return parseFloat(document.getElementById('slideInput').value) || 0;
  } else if (slide.type === 'select') {
    return document.getElementById('slideInput').value;
  } else if (slide.type === 'choice') {
    return answers[slide.key];
  }
  return null;
}

function goNext() {
  var slide = slides[currentSlide];
  var val = getCurrentValue();

  if (slide.type === 'number') {
    answers[slide.key] = val;
  } else if (slide.type === 'select') {
    answers[slide.key] = val;
  } else if (slide.type === 'choice') {
    if (answers[slide.key] === '' || answers[slide.key] === 0 && slide.key !== 'dependents') return;
  }

  if (currentSlide < slides.length - 1) {
    currentSlide++;
    renderSlide(currentSlide, false);
  } else {
    runAnalysis();
  }
}

function goBack() {
  if (currentSlide > 0) {
    currentSlide--;
    renderSlide(currentSlide, true);
  }
}

function skipOnboarding() {
  window.location.href = '/dashboard.html';
}

async function runAnalysis() {
  document.getElementById('mainWrapper').style.opacity = '0';
  setTimeout(function() {
    document.getElementById('mainWrapper').style.display = 'none';
    var as = document.getElementById('analysisScreen');
    as.style.display = 'flex';

    var steps = ['as1','as2','as3','as4'];
    steps.forEach(function(id, i) {
      setTimeout(function() {
        document.querySelectorAll('.astep').forEach(function(s) { s.classList.remove('active'); });
        document.getElementById(id).classList.add('active');
      }, i * 700);
    });

    setTimeout(function() {
      calculateAndShow();
    }, 3200);
  }, 500);
}

async function calculateAndShow() {
  var totalExp = answers.rent + answers.otherExpenses;
  var available = answers.income - totalExp;
  var expRatio = answers.income > 0 ? totalExp / answers.income : 1;
  var debtRatio = answers.income > 0 ? answers.debt / (answers.income * 12) : 0;
  var savingsMonths = totalExp > 0 ? answers.savings / totalExp : 0;
  var cur = answers.currency;

  var score = 0;
  if (expRatio <= 0.5) score += 30; else if (expRatio <= 0.65) score += 22; else if (expRatio <= 0.75) score += 15; else if (expRatio <= 0.85) score += 8;
  if (answers.debt === 0) score += 30; else if (debtRatio <= 0.5) score += 22; else if (debtRatio <= 1) score += 15; else if (debtRatio <= 2) score += 8; else score += 2;
  if (savingsMonths >= 6) score += 25; else if (savingsMonths >= 3) score += 18; else if (savingsMonths >= 1) score += 10; else if (answers.savings > 0) score += 4;
  if (available > 0 && available / answers.income >= 0.2) score += 15; else if (available > 0) score += 8;

  var grade = score >= 75 ? 'Strong financial foundation' : score >= 55 ? 'Good — clear path forward' : score >= 35 ? 'Needs focused attention' : 'Immediate action required';
  var monthsToDebtFree = available > 0 && answers.debt > 0 ? Math.ceil(answers.debt / Math.max(1, available * 0.5)) : 0;

  var actions = [];
  if (available < 0) {
    actions.push('Your expenses exceed your income by ' + cur + ' ' + Math.abs(Math.round(available)).toLocaleString() + '/month. This is the first thing we address.');
  } else {
    actions.push('You have ' + cur + ' ' + Math.round(available).toLocaleString() + ' available monthly. I recommend ' + cur + ' ' + Math.round(available * 0.5).toLocaleString() + ' toward debt and ' + cur + ' ' + Math.round(available * 0.3).toLocaleString() + ' toward savings.');
  }
  if (answers.debt > 0 && monthsToDebtFree > 0) {
    actions.push('Following my plan, you can be debt-free in approximately ' + monthsToDebtFree + ' months.');
  }
  if (savingsMonths < 1) {
    actions.push('Start with one month of expenses — ' + cur + ' ' + Math.round(totalExp).toLocaleString() + ' — as your emergency fund target.');
  }

  await saveToSupabase(score, available, totalExp);
  showResult(score, grade, cur, available, answers.debt, answers.savings, monthsToDebtFree, actions);
}

async function saveToSupabase(score, available, totalExp) {
  var profileData = {
    monthly_income: answers.income,
    currency: answers.currency,
    language: answers.language,
    financial_challenge: answers.fear,
    onboarding_completed: true
  };
  var finData = {
    health_score: score,
    total_debt: answers.debt,
    total_savings: answers.savings,
    monthly_budget: available,
    emergency_fund: answers.savings
  };
  localStorage.setItem('vera_profile', JSON.stringify(profileData));
  localStorage.setItem('vera_fin', JSON.stringify(finData));
  localStorage.setItem('vera_onboarding_done', 'true');

  try {
    await sb.from('profiles').update({
      financial_challenge: answers.fear,
      monthly_income: answers.income,
      currency: answers.currency,
      language: answers.language,
      onboarding_completed: true,
      updated_at: new Date().toISOString()
    }).eq('id', user.id);
  } catch(e) { console.log('Profile update error:', e); }

  try {
    await sb.from('financial_data').upsert({
      user_id: user.id,
      health_score: score,
      total_debt: answers.debt,
      total_savings: answers.savings,
      monthly_budget: available,
      emergency_fund: answers.savings,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
  } catch(e) {
    try {
      await sb.from('financial_data').insert({
        user_id: user.id,
        health_score: score,
        total_debt: answers.debt,
        total_savings: answers.savings,
        monthly_budget: available,
        emergency_fund: answers.savings,
        updated_at: new Date().toISOString()
      });
    } catch(e2) { console.log('Financial data error:', e2); }
  }
}

function showResult(score, grade, cur, available, debt, savings, monthsToDebtFree, actions) {
  document.getElementById('analysisScreen').style.display = 'none';
  var rs = document.getElementById('resultScreen');
  rs.style.display = 'flex';

  var debtFreeText = monthsToDebtFree > 0 ? monthsToDebtFree + ' mo' : debt === 0 ? 'Debt free' : 'TBD';
  var avColor = available >= 0 ? 'teal' : 'red';

  document.getElementById('resultCard').innerHTML =
    '<div class="result-header">' +
      '<div class="result-vera-lbl">Vera\'s Assessment — Session 1</div>' +
      '<div class="result-score-num">' + score + '<span class="result-score-max">/100</span></div>' +
      '<div class="result-grade">' + grade + '</div>' +
    '</div>' +
    '<div class="result-body">' +
      '<div class="result-stat-row">' +
        '<div class="rstat"><div class="rstat-lbl">Monthly surplus</div><div class="rstat-val ' + avColor + '">' + cur + ' ' + Math.round(Math.abs(available)).toLocaleString() + (available < 0 ? ' deficit' : '') + '</div></div>' +
        '<div class="rstat"><div class="rstat-lbl">Total debt</div><div class="rstat-val ' + (debt > 0 ? 'red' : 'teal') + '">' + cur + ' ' + debt.toLocaleString() + '</div></div>' +
        '<div class="rstat"><div class="rstat-lbl">Debt-free in</div><div class="rstat-val gold">' + debtFreeText + '</div></div>' +
        '<div class="rstat"><div class="rstat-lbl">Current savings</div><div class="rstat-val teal">' + cur + ' ' + savings.toLocaleString() + '</div></div>' +
      '</div>' +
      '<div class="result-actions-title">Vera\'s immediate recommendations</div>' +
      actions.map(function(a) { return '<div class="result-action">' + a + '</div>'; }).join('') +
      '<button class="btn-enter-dashboard" onclick="enterDashboard()">Enter my financial dashboard →</button>' +
    '</div>';
}

function enterDashboard() {
  window.location.href = '/dashboard.html';
}

init();
</script>
</body>
</html>
